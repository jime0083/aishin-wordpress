# ローカル開発用 WordPress 環境
# 起動:   docker compose up -d      → http://localhost:8000
# 停止:   docker compose down
# WP-CLI: docker compose run --rm wpcli <コマンド>  例) docker compose run --rm wpcli core version
# ※認証情報は全てローカル開発専用の固定値（本番とは無関係）

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8000:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/aishin:/var/www/html/wp-content/themes/aishin

  wpcli:
    image: wordpress:cli
    depends_on:
      - db
      - wordpress
    user: "33:33" # www-data（wordpressコンテナと同一ユーザーで書き込み権限を揃える）
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/aishin:/var/www/html/wp-content/themes/aishin
      - ./seed:/seed
    entrypoint: ["wp"]
    command: ["--info"]
    profiles:
      - cli

  phpmyadmin:
    image: phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: wordpress
      PMA_PASSWORD: wordpress

volumes:
  db_data:
  wp_data:
